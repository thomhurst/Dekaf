name: Benchmarks

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/docs/benchmarks.md'
  workflow_dispatch:
    inputs:
      benchmark_filter:
        description: 'Benchmark filter (e.g., *Unit*, *Client*, *Producer*)'
        required: false
        default: '*'

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

# concurrency:
#   group: "benchmarks"
#   cancel-in-progress: false

jobs:
  unit-benchmarks:
    name: Unit Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build --configuration Release

      - name: Run Unit Benchmarks
        run: |
          cd tools/Dekaf.Benchmarks
          dotnet run -c Release --no-build -- --filter "*Unit*" --exporters json --artifacts ./BenchmarkResults/Unit
        continue-on-error: true

      - name: Upload Results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-unit
          path: tools/Dekaf.Benchmarks/BenchmarkResults/
          retention-days: 30

  client-benchmarks:
    name: Client Benchmarks (Dekaf vs Confluent)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Start Kafka
        run: |
          docker run -d --name kafka \
            -p 9092:9092 \
            apache/kafka:latest

          echo "Waiting for Kafka to start..."
          for i in {1..30}; do
            if docker exec kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null; then
              echo "Kafka is ready"
              break
            fi
            echo "Attempt $i: Kafka not ready yet..."
            sleep 2
          done

      - name: Build
        run: dotnet build --configuration Release

      - name: Run Client Benchmarks
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: |
          cd tools/Dekaf.Benchmarks
          dotnet run -c Release --no-build -- --filter "*Client*" --exporters json --artifacts ./BenchmarkResults/Client
        continue-on-error: true

      - name: Stop Kafka
        if: always()
        run: docker rm -f kafka || true

      - name: Upload Results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-client
          path: tools/Dekaf.Benchmarks/BenchmarkResults/
          retention-days: 30

  client-benchmarks-native-memory:
    name: Client Benchmarks with Native Memory (Windows)
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build --configuration Release

      # windows-latest runs Docker in Windows-container mode and cannot pull the Linux
      # Kafka image, so Testcontainers fails. Instead run a native single-node KRaft broker
      # (Java is preinstalled on the runner) and point the benchmarks at it via
      # KAFKA_BOOTSTRAP_SERVERS, which KafkaTestEnvironment uses as an external broker.
      #
      # The broker MUST be started in the same step as the benchmark run: a background
      # process started in an earlier step is killed when that step's shell exits, so a
      # separate "Start Kafka" step leaves the benchmarks with no broker to connect to.
      - name: Run Client Benchmarks with Native Memory Profiler
        shell: pwsh
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: |
          $ErrorActionPreference = 'Stop'
          $env:JAVA_HOME = $env:JAVA_HOME_17_X64
          # Set heap explicitly so kafka-server-start.bat skips its wmic-based arch probe
          # (wmic is removed on windows-latest / Server 2025).
          $env:KAFKA_HEAP_OPTS = '-Xmx1G -Xms1G'
          Write-Host "Using JAVA_HOME=$env:JAVA_HOME"

          $version = '4.0.0'
          $pkg = "kafka_2.13-$version"
          Write-Host "Downloading Apache Kafka $version..."
          Invoke-WebRequest -Uri "https://archive.apache.org/dist/kafka/$version/$pkg.tgz" -OutFile kafka.tgz
          tar -xzf kafka.tgz
          $kafka = Join-Path (Get-Location) $pkg

          # Force clients (Confluent + Dekaf) to reconnect to localhost after bootstrap.
          Add-Content "$kafka\config\server.properties" "`nadvertised.listeners=PLAINTEXT://localhost:9092`n"

          # kafka-storage prints a spurious log4j2 status line alongside the UUID, so
          # capture only the line that looks like a Kafka cluster id (22 url-safe chars).
          $clusterId = & "$kafka\bin\windows\kafka-storage.bat" random-uuid 2>&1 |
            Where-Object { $_ -match '^[A-Za-z0-9_-]{22}$' } | Select-Object -First 1
          if (-not $clusterId) { throw 'Could not obtain a Kafka cluster id' }
          Write-Host "Cluster id: $clusterId"
          & "$kafka\bin\windows\kafka-storage.bat" format --standalone --cluster-id $clusterId --config "$kafka\config\server.properties"
          if ($LASTEXITCODE -ne 0) { throw "kafka-storage format failed (exit $LASTEXITCODE)" }

          $proc = Start-Process -FilePath "$kafka\bin\windows\kafka-server-start.bat" `
            -ArgumentList "`"$kafka\config\server.properties`"" `
            -RedirectStandardOutput "$kafka\kafka.out" -RedirectStandardError "$kafka\kafka.err" -PassThru
          Write-Host "Kafka starting (PID $($proc.Id)); waiting for :9092..."

          $ready = $false
          for ($i = 1; $i -le 60; $i++) {
            try {
              $c = New-Object System.Net.Sockets.TcpClient
              $c.Connect('127.0.0.1', 9092)
              if ($c.Connected) { $c.Close(); $ready = $true; break }
            } catch { Start-Sleep -Seconds 2 }
          }
          if (-not $ready) {
            Write-Host '----- kafka.out -----'; Get-Content "$kafka\kafka.out" -ErrorAction SilentlyContinue
            Write-Host '----- kafka.err -----'; Get-Content "$kafka\kafka.err" -ErrorAction SilentlyContinue
            throw 'Kafka did not become ready on :9092'
          }
          Write-Host 'Kafka is ready on localhost:9092'

          # Broker is up in this same step; run the benchmarks against it, then stop it.
          # A benchmark-level failure should not fail the pipeline (results are uploaded
          # as artifacts regardless), but a Kafka *setup* failure above already threw.
          try {
            Push-Location tools/Dekaf.Benchmarks
            dotnet run -c Release --no-build -- --filter "*Client*" --profiler NativeMemory --exporters json --artifacts ./BenchmarkResults/ClientNative
            Write-Host "Benchmark run exited with $LASTEXITCODE"
          } finally {
            Pop-Location
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
          exit 0

      - name: Upload Results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-client-native
          path: tools/Dekaf.Benchmarks/BenchmarkResults/
          retention-days: 30

  benchmark-summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [unit-benchmarks, client-benchmarks, client-benchmarks-native-memory]
    if: always()

    steps:
      - name: Download All Results
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-results-*
          path: benchmark-results
          merge-multiple: true

      - name: Generate Benchmark Summary
        run: |
          python3 << 'EOF'
          import os
          import glob

          output = []
          output.append("# Dekaf Benchmark Results\n")

          # Add the BenchmarkDotNet markdown reports directly
          # They have proper tables with Ratio columns

          # Producer benchmarks
          producer_md = glob.glob("benchmark-results/Client/results/*ProducerBenchmarks*-github.md")
          if producer_md:
              output.append("## Producer Benchmarks (Dekaf vs Confluent.Kafka)\n")
              output.append("> **Ratio < 1.0 means Dekaf is faster than Confluent**\n")
              with open(producer_md[0]) as f:
                  content = f.read()
                  # Remove the ``` code block wrapper
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          # Consumer benchmarks
          consumer_md = glob.glob("benchmark-results/Client/results/*ConsumerBenchmarks*-github.md")
          if consumer_md:
              output.append("## Consumer Benchmarks (Dekaf vs Confluent.Kafka)\n")
              with open(consumer_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          # Native memory benchmarks (Windows, ETW-based NativeMemoryProfiler)
          native_md = glob.glob("benchmark-results/ClientNative/results/*ConsumerBenchmarks*-github.md")
          native_md += glob.glob("benchmark-results/ClientNative/results/*ProducerBenchmarks*-github.md")
          if native_md:
              output.append("## Native Memory Comparison (Windows, ETW)\n")
              output.append("> **'Allocated native memory' captures librdkafka's unmanaged allocations, invisible to the managed Allocated column.** Compare Dekaf's Allocated against Confluent's Allocated + Allocated native memory for a fair total.\n")
              for md in native_md:
                  with open(md) as f:
                      content = f.read()
                      lines = content.split('\n')
                      in_table = False
                      for line in lines:
                          if line.startswith('|'):
                              in_table = True
                          if in_table:
                              output.append(line)
                  output.append("")

          # Protocol benchmarks (zero-allocation)
          protocol_md = glob.glob("benchmark-results/Unit/results/*ProtocolBenchmarks*-github.md")
          if protocol_md:
              output.append("## Protocol Benchmarks (Zero-Allocation Wire Protocol)\n")
              output.append("> **Allocated = `-` means zero heap allocations** ✓\n")
              with open(protocol_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          # Serializer benchmarks
          serializer_md = glob.glob("benchmark-results/Unit/results/*SerializerBenchmarks*-github.md")
          if serializer_md:
              output.append("## Serializer Benchmarks\n")
              with open(serializer_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          # Compression benchmarks
          compression_md = glob.glob("benchmark-results/Unit/results/*CompressionBenchmarks*-github.md")
          if compression_md:
              output.append("## Compression Benchmarks (Snappy)\n")
              with open(compression_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          output.append("---\n")
          output.append("*Benchmarks run on GitHub Actions (ubuntu-latest) with BenchmarkDotNet*")

          # Write to summary
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('\n'.join(output))
          EOF

  benchmark-history:
    name: Store Benchmark History
    runs-on: ubuntu-latest
    needs: [unit-benchmarks, client-benchmarks]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Benchmark Results
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-results-*
          path: benchmark-results
          merge-multiple: true

      - name: Combine Benchmark Results
        run: |
          mkdir -p combined-results

          python3 << 'EOF'
          import json
          import os

          combined = {'Benchmarks': []}
          for root, dirs, files in os.walk('benchmark-results'):
              # ClientNative runs on windows-latest; mixing its timings into the
              # Linux-based history chart would corrupt trend data
              if 'ClientNative' in root:
                  continue
              for f in files:
                  if f.endswith('.json') and 'results' in root:
                      path = os.path.join(root, f)
                      print(f"Processing: {path}")
                      with open(path) as fp:
                          data = json.load(fp)
                          for bench in data.get('Benchmarks', []):
                              stats = bench.get('Statistics')
                              if stats is not None and stats.get('Mean') is not None:
                                  combined['Benchmarks'].append(bench)
                              else:
                                  print(f"  Skipping (null Statistics): {bench.get('DisplayInfo', bench.get('Method', 'unknown'))}")

          with open('combined-results/combined.json', 'w') as fp:
              json.dump(combined, fp)

          print(f"\nCombined results: {len(combined['Benchmarks'])} benchmarks")
          EOF

      - name: Store Benchmark Results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Dekaf Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: combined-results/combined.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@thomholloway'

  publish-to-docs:
    name: Publish Benchmarks to Documentation
    runs-on: ubuntu-latest
    needs: [unit-benchmarks, client-benchmarks]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Benchmark Results
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-results-*
          path: benchmark-results
          merge-multiple: true

      - name: Generate Benchmarks Documentation
        run: |
          python3 << 'EOF'
          import os
          import glob
          from datetime import datetime

          output = []
          output.append("---")
          output.append("sidebar_position: 13")
          output.append("---")
          output.append("")
          output.append("# Benchmark Results")
          output.append("")
          output.append("Live benchmark comparisons between Dekaf and Confluent.Kafka, automatically updated on every commit to main.")
          output.append("")
          output.append(f"**Last Updated:** {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}")
          output.append("")
          output.append(":::info")
          output.append("These benchmarks run on GitHub Actions (ubuntu-latest) using BenchmarkDotNet. ")
          output.append("**Ratio < 1.0 means Dekaf is faster than Confluent.Kafka**")
          output.append(":::")
          output.append("")

          # Producer benchmarks
          producer_md = glob.glob("benchmark-results/Client/results/*ProducerBenchmarks*-github.md")
          if producer_md:
              output.append("## Producer Benchmarks")
              output.append("")
              output.append("Comparing Dekaf vs Confluent.Kafka for message production across different scenarios.")
              output.append("")
              with open(producer_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          # Consumer benchmarks
          consumer_md = glob.glob("benchmark-results/Client/results/*ConsumerBenchmarks*-github.md")
          if consumer_md:
              output.append("## Consumer Benchmarks")
              output.append("")
              output.append("Comparing Dekaf vs Confluent.Kafka for message consumption.")
              output.append("")
              with open(consumer_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          # Protocol benchmarks (zero-allocation)
          protocol_md = glob.glob("benchmark-results/Unit/results/*ProtocolBenchmarks*-github.md")
          if protocol_md:
              output.append("## Protocol Benchmarks")
              output.append("")
              output.append("Zero-allocation wire protocol serialization/deserialization.")
              output.append("")
              output.append(":::tip")
              output.append("**Allocated = `-` means zero heap allocations** - the goal of Dekaf's design!")
              output.append(":::")
              output.append("")
              with open(protocol_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          # Serializer benchmarks
          serializer_md = glob.glob("benchmark-results/Unit/results/*SerializerBenchmarks*-github.md")
          if serializer_md:
              output.append("## Serializer Benchmarks")
              output.append("")
              with open(serializer_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          # Compression benchmarks
          compression_md = glob.glob("benchmark-results/Unit/results/*CompressionBenchmarks*-github.md")
          if compression_md:
              output.append("## Compression Benchmarks")
              output.append("")
              with open(compression_md[0]) as f:
                  content = f.read()
                  lines = content.split('\n')
                  in_table = False
                  for line in lines:
                      if line.startswith('|'):
                          in_table = True
                      if in_table:
                          output.append(line)
              output.append("")

          output.append("---")
          output.append("")
          output.append("## How to Read These Results")
          output.append("")
          output.append("- **Mean**: Average execution time")
          output.append("- **Error**: Half of 99.9% confidence interval")
          output.append("- **StdDev**: Standard deviation of all measurements")
          output.append("- **Ratio**: Performance relative to baseline (Confluent.Kafka)")
          output.append("  - `< 1.0` = Dekaf is faster")
          output.append("  - `> 1.0` = Confluent is faster")
          output.append("  - `1.0` = Same performance")
          output.append("- **Allocated**: Heap memory allocated per operation")
          output.append("  - `-` = Zero allocations (ideal!)")
          output.append("")
          output.append("*Benchmarks are automatically run on every push to main.*")

          # Write to docs
          os.makedirs('docs/docs', exist_ok=True)
          with open('docs/docs/benchmarks.md', 'w') as f:
              f.write('\n'.join(output))

          print(f"Generated benchmarks.md with {len(output)} lines")
          EOF

      - name: Create Pull Request for Benchmark Results
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: Update benchmark results"
          branch: docs/benchmark-results
          title: "docs: Update benchmark results"
          body: "Automated update of benchmark results documentation."
          labels: documentation
          delete-branch: true

      - name: Auto-merge Pull Request
        # NOTE: GITHUB_TOKEN / github-actions[bot] cannot merge here. The default-branch
        # ruleset requires 19 status checks, and on a user-owned repo the bot cannot be a
        # bypass actor. Only Admin/Maintain users can bypass, so --admin must run as a token
        # that represents such a user. BENCHMARK_MERGE_TOKEN is a fine-grained PAT (owner)
        # with Contents: write + Pull requests: write.
        if: steps.cpr.outputs.pull-request-number && steps.cpr.outputs.pull-request-operation != 'closed'
        env:
          GH_TOKEN: ${{ secrets.BENCHMARK_MERGE_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUMBER" --squash --delete-branch --admin
