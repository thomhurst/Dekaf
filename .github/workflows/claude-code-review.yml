name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number

concurrency:
  group: claude-review-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.actor != 'claude[bot]' &&
        github.actor != 'dependabot[bot]' &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect Claude workflow self-change
        id: workflow-change
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename' \
            | grep -Fx '.github/workflows/claude-code-review.yml' >/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.workflow-change.outputs.changed != 'true'
        # oven-sh/setup-bun@v2
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Run Claude Code Review
        if: steps.workflow-change.outputs.changed != 'true'
        id: claude-review
        # anthropics/claude-code-action@v1
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464
        with:
          
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            Instructions:
            - Apply this repository's own conventions: read CLAUDE.md and review against them (design, development standards, performance, zero-allocation). Flag violations of these project rules.
            - Review in priority order, reporting highest-severity first:
              * Correctness bugs and logic errors
              * Security issues
              * Missing or inadequate test coverage
              * Design/architecture, maintainability, better abstractions and anti-patterns
            - Verify every finding against the actual code before reporting it. Do not invent issues to fill space — if the code is sound, a brief acknowledgement is a valid review; say so rather than manufacturing suggestions.
            - When you do find an issue, suggest a concrete better approach and explain WHY it is better, not just WHAT to change.
            - Compare the current state of the PR against any previous PR comments to make sure they have been addressed.
            - Skip minor style/formatting issues unless they impact readability significantly.
            - End the review body with exactly one literal verdict marker as the final line. Use `<!-- REVIEW_VERDICT: BLOCKING -->` if you reported any actionable issue that should block merge. Use `<!-- REVIEW_VERDICT: CLEAR -->` only when there are zero actionable findings. Do not put the marker in a code block.
            - ALWAYS post your review, even if no issues are found (acknowledge good code). You MUST post using `gh pr review --comment` before finishing, and ONLY that command. Do not also use `gh pr comment` — it posts a separate issue comment, which duplicates the review. Do not just output the review - actually post it to the PR.

            Use the code review skill to run this review: /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || inputs.pr_number }}
          claude_args: |
            --allowedTools Bash,Read,Glob,Grep,WebFetch,WebSearch
            --model claude-sonnet-5
          allowed_bots: "dependabot[bot]"
