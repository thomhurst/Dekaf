name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_nuget:
        description: 'Publish to NuGet'
        type: boolean
        required: false
        default: false

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ContinuousIntegrationBuild: true
  Deterministic: true

# Cancel superseded runs: a newer commit on the same PR/branch cancels older
# in-progress runs. Manual workflow_dispatch runs (e.g. NuGet publish) are never
# cancelled.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  build-and-unit-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for GitVersion

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4
        continue-on-error: true  # Don't fail if GitVersion has issues on PR branches

      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - name: Run Pipeline
        env:
          SKIP_INTEGRATION_TESTS: 'true'
          SKIP_AOT_SMOKE_TESTS: 'true'
          NuGet__ShouldPublish: ${{ inputs.publish_nuget == true && 'true' || 'false' }}
          NuGet__ApiKey: ${{ secrets.NUGET__APIKEY }}
        run: dotnet run --project tools/Dekaf.Pipeline

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit
          path: |
            **/TestResults/**
            **/test-results/**
          retention-days: 7

      - name: Upload Packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            **/bin/Release/*.nupkg
            **/bin/Release/*.snupkg
          if-no-files-found: ignore
          retention-days: 30

      - name: Run netstandard2.0 package smoke
        shell: pwsh
        run: ./scripts/RunNetStandardPackageSmoke.ps1

      - name: Upload HangDump artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: hangdump-artifacts-${{ matrix.category }}
          path: |
            **/*.dmp
          if-no-files-found: ignore
          retention-days: 7

  native-aot-smoke:
    name: NativeAOT Smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            project: tests/Dekaf.Tests.Aot/Dekaf.Tests.Aot.csproj
            executable: Dekaf.Tests.Aot
          - name: dependency-injection
            project: tests/Dekaf.Tests.Aot.DependencyInjection/Dekaf.Tests.Aot.DependencyInjection.csproj
            executable: Dekaf.Tests.Aot.DependencyInjection

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Install NativeAOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish NativeAOT smoke executable
        run: |
          dotnet publish "${{ matrix.project }}" \
            --configuration Release \
            --framework net10.0 \
            --runtime linux-x64 \
            --self-contained true \
            --output "artifacts/aot/${{ matrix.name }}" \
            -p:PublishAot=true \
            -p:ContinuousIntegrationBuild=true \
            -p:TreatWarningsAsErrors=true

      - name: Run NativeAOT smoke executable
        run: ./artifacts/aot/${{ matrix.name }}/${{ matrix.executable }}

  native-aot-integration-publish:
    name: NativeAOT Integration Publish
    needs: build-and-unit-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Install NativeAOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish NativeAOT integration executable
        run: |
          dotnet publish tests/Dekaf.Tests.Integration/Dekaf.Tests.Integration.csproj \
            --configuration Release \
            --framework net10.0 \
            --runtime linux-x64 \
            --self-contained true \
            --output artifacts/aot/integration \
            -p:PublishAot=true \
            -p:ContinuousIntegrationBuild=true \
            -p:TreatWarningsAsErrors=true

      - name: Upload NativeAOT integration executable
        uses: actions/upload-artifact@v7
        with:
          name: native-aot-integration
          path: artifacts/aot/integration/**
          if-no-files-found: error
          retention-days: 7

  integration-tests:
    name: Integration Tests (${{ matrix.category }})
    needs: build-and-unit-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        category: [Producer, MultiInFlightProducer, Backpressure, Consumer, ConsumerLag, ConsumerGroup, Transaction, Admin, Authentication, Authorization, Tls, Serialization, Resilience, Messaging, MessagingPatterns, MessagingOrdering, Compression, Offsets, NetworkPartition, Retry, ShareConsumer, ShareConsumerAdmin, Telemetry]
      fail-fast: false

    steps:
      - name: Add Swap Space
        run: |
          sudo fallocate -l 8G /mnt/extra-swapfile
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
          free -h

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - name: Run Pipeline
        env:
          INTEGRATION_TEST_CATEGORY: ${{ matrix.category }}
          SKIP_UNIT_TESTS: 'true'
        run: dotnet run --project tools/Dekaf.Pipeline

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-integration-${{ matrix.category }}
          path: |
            **/TestResults/**
            **/test-results/**
          retention-days: 7

      - name: Upload HangDump artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: hangdump-artifacts-${{ matrix.category }}
          path: |
            **/*.dmp
          if-no-files-found: ignore
          retention-days: 7

  integration-tests-aot:
    name: Integration Tests AOT (${{ matrix.category }})
    needs: native-aot-integration-publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        category: [Producer, MultiInFlightProducer, Backpressure, Consumer, ConsumerLag, ConsumerGroup, Transaction, Admin, Authentication, Authorization, Tls, Serialization, Resilience, Messaging, MessagingPatterns, MessagingOrdering, Compression, Offsets, NetworkPartition, Retry, ShareConsumer, ShareConsumerAdmin, Telemetry]
      fail-fast: false

    steps:
      - name: Add Swap Space
        run: |
          sudo fallocate -l 8G /mnt/extra-swapfile
          sudo chmod 600 /mnt/extra-swapfile
          sudo mkswap /mnt/extra-swapfile
          sudo swapon /mnt/extra-swapfile
          free -h

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download NativeAOT integration executable
        uses: actions/download-artifact@v7
        with:
          name: native-aot-integration
          path: artifacts/aot/integration

      - name: Expose GitHub Actions Runtime
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - name: Run NativeAOT integration tests
        timeout-minutes: 25
        env:
          NET_VERSION: net10.0
          DOTNET_GCConserveMemory: '9'
        run: |
          chmod +x ./artifacts/aot/integration/Dekaf.Tests.Integration
          args=(
            --hangdump
            --hangdump-timeout 15m
            --log-level Debug
            --treenode-filter "/**[Category=${{ matrix.category }}]"
          )
          case "${{ matrix.category }}" in
            Producer)
              args+=(--maximum-parallel-tests 4)
              ;;
            NetworkPartition|ShareConsumer|ShareConsumerAdmin)
              args+=(--maximum-parallel-tests 1)
              ;;
          esac
          ./artifacts/aot/integration/Dekaf.Tests.Integration "${args[@]}"

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-integration-aot-${{ matrix.category }}
          path: |
            **/TestResults/**
            **/test-results/**
          retention-days: 7

      - name: Upload HangDump artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: hangdump-artifacts-integration-aot-${{ matrix.category }}
          path: |
            **/*.dmp
          if-no-files-found: ignore
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Check Formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true  # Format check is informational
