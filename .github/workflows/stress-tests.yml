name: Stress Tests

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2 AM UTC
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'Test duration in minutes'
        required: false
        default: '15'
      message_size:
        description: 'Message size in bytes'
        required: false
        default: '1000'

concurrency:
  group: stress-tests
  cancel-in-progress: false

jobs:
  # Run each test scenario in parallel
  stress-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: producer
            client: dekaf
            brokers: 1
            name: Dekaf Producer
          - scenario: producer
            client: confluent
            brokers: 1
            name: Confluent Producer
          - scenario: producer-idempotent
            client: dekaf
            brokers: 1
            name: Dekaf Producer (Idempotent)
          - scenario: producer-idempotent
            client: confluent
            brokers: 1
            name: Confluent Producer (Idempotent)
          - scenario: producer-acks-all
            client: dekaf
            brokers: 1
            name: Dekaf Producer (Acks All)
          - scenario: producer-acks-all
            client: confluent
            brokers: 1
            name: Confluent Producer (Acks All)
          - scenario: consumer
            client: dekaf
            brokers: 1
            name: Dekaf Consumer
          - scenario: consumer
            client: confluent
            brokers: 1
            name: Confluent Consumer
          # Multi-broker: producer scenarios only — consumer throughput is unaffected by
          # replication factor since Acks only applies to producers.
          - scenario: producer
            client: dekaf
            brokers: 3
            name: Dekaf Producer (3 Brokers)
          - scenario: producer
            client: confluent
            brokers: 3
            name: Confluent Producer (3 Brokers)
          - scenario: producer-acks-all
            client: dekaf
            brokers: 3
            name: Dekaf Producer Acks All (3 Brokers)
          - scenario: producer-acks-all
            client: confluent
            brokers: 3
            name: Confluent Producer Acks All (3 Brokers)
          - scenario: producer-idempotent
            client: dekaf
            brokers: 3
            name: Dekaf Producer Idempotent (3 Brokers)
          - scenario: producer-idempotent
            client: confluent
            brokers: 3
            name: Confluent Producer Idempotent (3 Brokers)
          # Multi-connection variants: Dekaf-only with explicit 3 connections per broker.
          # Tests whether explicit multi-connection config outperforms adaptive scaling.
          - scenario: producer
            client: dekaf
            brokers: 1
            connections_per_broker: 3
            name: Dekaf Producer (3conn)
          - scenario: producer
            client: dekaf
            brokers: 3
            connections_per_broker: 3
            name: Dekaf Producer (3conn, 3 Brokers)
          - scenario: producer-idempotent
            client: dekaf
            brokers: 1
            connections_per_broker: 3
            name: Dekaf Producer Idempotent (3conn)
          - scenario: producer-idempotent
            client: dekaf
            brokers: 3
            connections_per_broker: 3
            name: Dekaf Producer Idempotent (3conn, 3 Brokers)

    name: ${{ matrix.name }}
    # 8 vCPUs, split so the client under test is the measured bottleneck:
    # brokers are pinned to BROKER_CPUS, the client to CLIENT_CPUS. On a shared-core
    # runner both clients just saturate the broker and report identical numbers.
    runs-on: ubicloud-standard-8
    timeout-minutes: ${{ matrix.brokers > 1 && 75 || 60 }}
    env:
      BROKER_CPUS: 0-5
      CLIENT_CPUS: 6,7
      # Broker log dirs live on tmpfs so disk I/O never caps ingestion. Sized above the
      # worst-case retention overshoot (see KafkaEnvironment.RetentionConfig for the
      # math); a fill halts the broker, so the disk monitor below samples usage during
      # the run to make one visible in the job output.
      BROKER_TMPFS: 6g
      # Broker JVM heap: the image default (1 GB) is undersized for ~1 GB/s ingestion.
      BROKER_HEAP: -Xmx2g -Xms2g

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build Stress Tests
        run: dotnet build tools/Dekaf.StressTests --configuration Release

      - name: Start Kafka
        if: matrix.brokers == 1
        run: |
          # Broker pinned to its own cores (client under test gets the rest) and log
          # dir on tmpfs so neither broker CPU starvation nor disk I/O caps ingestion.
          # mode=1777: the Kafka image runs as a non-root user, which cannot write to
          # a default root-owned tmpfs mount.
          # KAFKA_LOG_INITIAL_TASK_DELAY_MS=1000 is load-bearing — without it the broker
          # dies of tmpfs fill before its first retention sweep; see the rationale on
          # KafkaEnvironment.RetentionConfig.
          docker run -d --name kafka \
            --cpuset-cpus="${BROKER_CPUS}" \
            --tmpfs /var/lib/kafka/data:rw,size=${BROKER_TMPFS},mode=1777 \
            -p 9092:9092 \
            -e KAFKA_HEAP_OPTS="${BROKER_HEAP}" \
            -e KAFKA_NODE_ID=1 \
            -e KAFKA_PROCESS_ROLES=broker,controller \
            -e KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092 \
            -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            -e KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093 \
            -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
            -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
            -e KAFKA_LOG_DIRS=/var/lib/kafka/data \
            -e CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qg \
            -e KAFKA_LOG_RETENTION_MS=10000 \
            -e KAFKA_LOG_RETENTION_BYTES=134217728 \
            -e KAFKA_LOG_SEGMENT_BYTES=33554432 \
            -e KAFKA_LOG_SEGMENT_DELETE_DELAY_MS=100 \
            -e KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=1000 \
            -e KAFKA_LOG_INITIAL_TASK_DELAY_MS=1000 \
            -e KAFKA_LOG_CLEANUP_POLICY=delete \
            apache/kafka:latest

          echo "Waiting for Kafka to be ready..."
          for i in {1..60}; do
            if docker exec kafka /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1; then
              echo "Kafka is ready"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done

          # The retention settings above are what keeps the tmpfs from filling; verify
          # the image actually applied them rather than assuming the env mapping worked.
          echo "=== Effective broker retention/segment config ==="
          docker logs kafka 2>&1 | grep -E 'log\.retention\.|log\.segment\.|log\.cleanup' | head -15 || true

      - name: Run ${{ matrix.name }} Stress Test
        env:
          KAFKA_BOOTSTRAP_SERVERS: ${{ matrix.brokers == 1 && 'localhost:9092' || '' }}
          # Multi-broker runs start brokers via Testcontainers from inside the client
          # process; these apply the same core pinning and tmpfs as the docker run above.
          STRESS_BROKER_CPUSET: ${{ env.BROKER_CPUS }}
          STRESS_BROKER_TMPFS: ${{ env.BROKER_TMPFS }}
          STRESS_BROKER_HEAP: ${{ env.BROKER_HEAP }}
        run: |
          # Background disk monitor: samples every broker's log-dir usage so a tmpfs
          # fill (ingestion outpacing retention — the known broker-halt failure mode)
          # is visible in the uploaded artifacts. Iterates docker ps each tick because
          # multi-broker containers are started later by the test process itself.
          # Pinned to the broker cores: the docker exec round trips must not steal
          # cycles from the client cores whose isolation this job exists to provide.
          taskset -c "${BROKER_CPUS}" bash -c '
            while true; do
              containers=$(docker ps --format "{{.Names}}")
              if [ -z "$containers" ]; then
                # A dead broker vanishes from docker ps; log that instead of going
                # silent so the artifact shows *when* it died, not just that it did.
                echo "[$(date -u "+%H:%M:%S")] no running containers"
              fi
              for c in $containers; do
                line=$(docker exec "$c" df -h /var/lib/kafka/data 2>/dev/null | tail -n 1) \
                  && echo "[$(date -u "+%H:%M:%S")] $c: $line"
              done
              sleep 15
            done
          ' > "$GITHUB_WORKSPACE/broker-disk.log" 2>&1 &
          DISK_MONITOR_PID=$!

          cd tools/Dekaf.StressTests
          # Client pinned to its own cores: whichever client pushes more through the
          # same cores is genuinely faster, instead of both saturating the broker.
          taskset -c ${CLIENT_CPUS} dotnet run --configuration Release --no-build -- \
            --duration ${{ github.event.inputs.duration_minutes || '15' }} \
            --message-size ${{ github.event.inputs.message_size || '1000' }} \
            --scenario ${{ matrix.scenario }} \
            --client ${{ matrix.client }} \
            --brokers ${{ matrix.brokers }} \
            --connections-per-broker ${{ matrix.connections_per_broker || '1' }} \
            --output ./results

          kill $DISK_MONITOR_PID 2>/dev/null || true

      - name: Broker Diagnostics
        if: always()
        run: |
          echo "=== Broker log-dir usage over time ==="
          cat "$GITHUB_WORKSPACE/broker-disk.log" 2>/dev/null || echo "(no disk log captured)"
          # Multi-broker containers are owned by the test process, which dumps their
          # diagnostics before disposing them; only the workflow-managed single broker
          # is still around to inspect here.
          if [ "${{ matrix.brokers }}" = "1" ]; then
            echo "=== Broker errors/storage events ==="
            docker logs kafka 2>&1 | grep -iE 'ERROR|FATAL|No space|IOException|offline|shutdown' | tail -40 || true
            echo "=== Broker last 60 log lines ==="
            docker logs --tail 60 kafka 2>&1 || true
          fi

      # A broker that dies mid-run (e.g. log dir full -> LogManager shutdown) makes
      # every number in this job's results meaningless; fail the job so they are never
      # published. Producer scenarios also fail client-side (a dead broker fails the
      # post-run end-offset query — that is what covers multi-broker runs, whose
      # containers the test process owns and disposes), but consumer scenarios have no
      # such check and would otherwise report near-zero throughput as a valid result;
      # this step also gives a clearer verdict than the client's exception trace.
      - name: Verify Broker Survived
        if: matrix.brokers == 1
        run: |
          status=$(docker inspect -f '{{.State.Status}}' kafka 2>/dev/null || echo "missing")
          if [ "$status" != "running" ]; then
            echo "::error::Broker container is '$status' — it died during the run; see Broker Diagnostics above"
            exit 1
          fi
          echo "Broker container is running"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.client }}-${{ matrix.scenario }}-${{ matrix.brokers }}brokers${{ matrix.connections_per_broker && format('-{0}conn', matrix.connections_per_broker) || '' }}
          path: |
            tools/Dekaf.StressTests/results/
            broker-disk.log
          retention-days: 90

      - name: Stop Kafka
        if: always() && matrix.brokers == 1
        run: docker rm -f kafka || true

  # Collect all results and generate summary
  generate-summary:
    needs: stress-test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download All Results
        uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: ./all-results
          # NOT merge-multiple: matrix jobs for the same client+scenario can emit
          # identically named result files (runs starting in the same second), and
          # merging would silently overwrite one — dropping rows from the published
          # tables. Per-artifact subdirectories keep every result; the recursive
          # glob below finds them all.
          merge-multiple: false

      - name: List Downloaded Results
        run: |
          echo "=== Downloaded Results ==="
          find ./all-results -type f -name "*.json" | head -20
          echo "=== Contents ==="
          for f in $(find ./all-results -type f -name "*.json"); do
            echo "--- $f ---"
            cat "$f" | head -50
          done

      - name: Merge Results and Generate Summary
        env:
          PYTHONPATH: .github/scripts
        run: |
          python3 << 'EOF'
          import json
          import os
          import glob
          from datetime import datetime
          from stress_report import generate_scenario_tables, format_gc_table

          # Find all JSON result files
          json_files = glob.glob("all-results/**/*.json", recursive=True)
          print(f"Found {len(json_files)} result files")

          if not json_files:
              print("No results found")
              exit(0)

          # Collect all individual results
          all_results = []
          run_started = None
          run_completed = None
          machine_name = None
          processor_count = None

          for json_file in json_files:
              print(f"Processing: {json_file}")
              try:
                  with open(json_file) as f:
                      data = json.load(f)

                  # Handle both single result and wrapped results format
                  if 'results' in data:
                      # Wrapped format from StressTestResults
                      all_results.extend(data['results'])
                      if run_started is None or data.get('runStartedAtUtc', '') < run_started:
                          run_started = data.get('runStartedAtUtc')
                      if run_completed is None or data.get('runCompletedAtUtc', '') > run_completed:
                          run_completed = data.get('runCompletedAtUtc')
                      machine_name = data.get('machineName', machine_name)
                      processor_count = data.get('processorCount', processor_count)
                  else:
                      # Single result format
                      all_results.append(data)

              except Exception as e:
                  print(f"Error processing {json_file}: {e}")

          print(f"Collected {len(all_results)} test results")

          # Create merged results
          merged = {
              'runStartedAtUtc': run_started or datetime.utcnow().isoformat(),
              'runCompletedAtUtc': run_completed or datetime.utcnow().isoformat(),
              'machineName': machine_name or 'GitHub Actions',
              'processorCount': processor_count or 4,
              'results': all_results
          }

          # Save merged results
          os.makedirs('merged-results', exist_ok=True)
          merged_path = f"merged-results/stress-test-results-{datetime.utcnow().strftime('%Y%m%d-%H%M%S')}.json"
          with open(merged_path, 'w') as f:
              json.dump(merged, f, indent=2)
          print(f"Saved merged results to: {merged_path}")

          # Generate markdown summary
          output = []
          output.append("# Dekaf Stress Test Results")
          output.append("")
          output.append(f"**Run Date:** {run_started or 'N/A'}")
          output.append(f"**Machine:** {machine_name or 'GitHub Actions'} ({processor_count or 'N/A'} processors)")
          output.append("")

          output.extend(generate_scenario_tables(all_results, include_ratio=True))
          output.extend(format_gc_table(all_results))

          # Write to GitHub summary
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_path:
              with open(summary_path, 'a') as f:
                  f.write('\n'.join(output))
              print(f"Wrote summary to GITHUB_STEP_SUMMARY")

          # Also print to console
          print('\n'.join(output))
          EOF

      - name: Upload Merged Results
        uses: actions/upload-artifact@v7
        with:
          name: stress-test-results-merged
          path: merged-results/
          retention-days: 90

  publish-to-docs:
    name: Publish Stress Test Results to Documentation
    needs: [stress-test, generate-summary]
    runs-on: ubuntu-latest
    # stress-test success is required: a failed scenario (e.g. broker died mid-run)
    # must block the docs update rather than publish a partial or invalid table.
    if: github.ref == 'refs/heads/main' && needs.stress-test.result == 'success' && needs.generate-summary.result == 'success'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Merged Results
        uses: actions/download-artifact@v8
        with:
          name: stress-test-results-merged
          path: ./results

      - name: Generate Stress Test Documentation
        env:
          PYTHONPATH: .github/scripts
        run: |
          python3 << 'EOF'
          import json
          import os
          import glob
          from datetime import datetime
          from stress_report import generate_scenario_tables, format_gc_table

          output = []
          output.append("---")
          output.append("sidebar_position: 14")
          output.append("---")
          output.append("")
          output.append("# Stress Test Results")
          output.append("")
          output.append("Long-running stress tests comparing sustained performance between Dekaf and Confluent.Kafka under real-world load.")
          output.append("")
          output.append(f"**Last Updated:** {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}")
          output.append("")
          output.append(":::info")
          output.append("These tests run weekly (Sunday 2 AM UTC) and can be manually triggered. ")
          output.append("They measure sustained performance over 15+ minutes with real Kafka instances.")
          output.append(":::")
          output.append("")

          # Find and parse JSON results
          json_files = glob.glob("results/**/*.json", recursive=True)

          if json_files:
              # Use the most recent file
              latest_file = sorted(json_files)[-1]
              print(f"Using: {latest_file}")

              try:
                  with open(latest_file) as f:
                      data = json.load(f)

                  results = data.get('results', [])

                  output.extend(generate_scenario_tables(results, include_callout=True))
                  output.extend(format_gc_table(results, title="Memory & GC Statistics"))

              except Exception as e:
                  print(f"Error processing results: {e}")
                  import traceback
                  traceback.print_exc()
          else:
              output.append("## No Results Available")
              output.append("")
              output.append("Stress test results will appear here after the first successful run.")
              output.append("")

          output.append("---")
          output.append("")
          output.append("## About These Tests")
          output.append("")
          output.append("Stress tests measure sustained performance over extended periods:")
          output.append("")
          output.append("- **Real Kafka**: Tests run against actual Apache Kafka instances")
          output.append("- **CPU Isolation**: Brokers are pinned to dedicated cores and the client under test to its own cores, so the client — not the broker — is the measured bottleneck")
          output.append("- **RAM-backed Broker Logs**: Kafka log dirs are mounted on tmpfs so disk I/O never caps broker ingestion")
          output.append("- **Delivered Throughput**: producer tables report broker-confirmed throughput, measured as the end-offset delta across all partitions — not the client-side append rate, which can run far ahead of what the broker ever accepts")
          output.append("- **Backpressure Parity**: both producers are bounded to the same 512 MB local buffer (Dekaf BufferMemory, librdkafka queue.buffering.max) and block on a full buffer, so neither client can absorb an unbounded backlog into RAM")
          output.append("- **Consumer Loop Replay**: Consumer tests re-read a pre-seeded topic (seek to beginning when drained) instead of racing a live feeder, so the consumer itself is measured")
          output.append("- **Delivery Latency Sampling**: 1 in 1000 produced messages is awaited end-to-end to record true broker round-trip latency")
          output.append("- **CPU Efficiency**: CPU time per message differentiates client efficiency even at equal throughput")
          output.append("- **Parallel Execution**: Each test runs in its own isolated environment")
          output.append("- **Both Clients**: Direct comparison between Dekaf and Confluent.Kafka")
          output.append("- **Memory Monitoring**: Tracks GC behavior and memory usage over time")
          output.append("- **Error Rates**: Ensures stability under load")
          output.append("")

          # Write to docs
          os.makedirs('docs/docs', exist_ok=True)
          with open('docs/docs/stress-tests.md', 'w') as f:
              f.write('\n'.join(output))

          print(f"Generated stress-tests.md with {len(output)} lines")
          EOF

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'docs: Update stress test results'
          title: 'docs: Update stress test results'
          body: 'Automated update of stress test results from latest CI run.'
          branch: docs/stress-test-results
          delete-branch: true

      - name: Enable Auto-Merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --squash --delete-branch --auto
